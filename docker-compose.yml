#
# Placeholder local development stack. No real credentials belong here;
# all values are sourced from environment variables / .env at runtime.

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kyc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kyc_password}
      POSTGRES_DB: ${POSTGRES_DB:-continuous_kyc}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

